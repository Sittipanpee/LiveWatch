<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Shop Helper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 340px;
      background: #f8fafc;
      color: #1a1a1a;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      background: #009995;
      color: #fff;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
    .version-badge {
      background: rgba(255,255,255,0.22);
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 10px;
    }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .tier-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      background: #888; color: #fff;
      text-transform: capitalize;
    }

    /* ── Status bar ── */
    .status-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-left { display: flex; align-items: center; gap: 8px; }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .status-dot.gray   { background: #9e9e9e; }
    .status-dot.green  { background: #22c55e; animation: pulse 1.4s ease-in-out infinite; }
    .status-dot.blue   { background: #3b82f6; animation: pulse 0.8s ease-in-out infinite; }
    .status-dot.orange { background: #f97316; animation: pulse 0.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .status-text { font-size: 13px; font-weight: 600; }
    .last-time { font-size: 11px; color: #9ca3af; }
    .last-time span { color: #374151; font-weight: 500; }

    /* ── Thumbnail ── */
    .thumb-section {
      background: #000;
      position: relative;
      width: 340px;
      height: 191px; /* 340 × 9/16 */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .thumb-img.visible { display: block; }
    .thumb-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #4b5563;
    }
    .thumb-placeholder.hidden { display: none; }
    .thumb-placeholder svg { opacity: .35; }
    .thumb-placeholder span { font-size: 11px; opacity: .5; }
    .thumb-badge {
      position: absolute;
      bottom: 7px; right: 9px;
      background: rgba(0,0,0,.55);
      color: #fff;
      font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 10px;
      display: none;
    }
    .thumb-badge.visible { display: block; }
    /* capturing overlay */
    .thumb-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #fff;
    }
    .thumb-overlay.visible { display: flex; }
    .overlay-text { font-size: 13px; font-weight: 600; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Body ── */
    .body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Alert banner ── */
    .alert-banner {
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; padding: 8px 10px;
      font-size: 12px; color: #dc2626;
      display: none; line-height: 1.4;
    }
    .alert-banner.visible { display: block; }

    /* ── Card base ── */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .card-title {
      font-size: 10px; font-weight: 700;
      color: #9ca3af; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 9px;
    }

    /* ── Score bars ── */
    .score-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 6px;
    }
    .score-row:last-child { margin-bottom: 0; }
    .score-label { font-size: 12px; color: #374151; white-space: nowrap; }
    .score-bar-wrap {
      display: flex; align-items: center; gap: 6px;
      flex: 1; margin-left: 10px;
    }
    .score-bar {
      flex: 1; height: 7px;
      background: #e5e7eb; border-radius: 4px; overflow: hidden;
    }
    .score-fill {
      height: 100%; border-radius: 4px;
      background: #009995;
      transition: width .4s ease;
    }
    .score-fill.red   { background: #ef4444; }
    .score-fill.amber { background: #f59e0b; }
    .score-num { font-size: 11px; color: #6b7280; width: 22px; text-align: right; font-weight: 600; }

    /* ── Chips ── */
    .flags-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 9px; }
    .flag-chip {
      font-size: 11px; padding: 3px 8px;
      border-radius: 20px; font-weight: 500;
    }
    .flag-chip.bad  { background: #fee2e2; color: #dc2626; }
    .flag-chip.good { background: #dcfce7; color: #16a34a; }
    .flag-chip.info { background: #e0f2fe; color: #0369a1; }
    .flag-chip.muted{ background: #f3f4f6; color: #6b7280; }

    /* ── Summary text ── */
    .summary-text {
      font-size: 11px; color: #6b7280;
      margin-top: 8px; font-style: italic;
      line-height: 1.55;
    }

    /* ── Today's stats ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .stat-cell {
      text-align: center;
      background: #f9fafb;
      border-radius: 8px;
      padding: 7px 4px;
    }
    .stat-num {
      font-size: 20px; font-weight: 700;
      line-height: 1; color: #111827;
    }
    .stat-num.red   { color: #dc2626; }
    .stat-num.amber { color: #d97706; }
    .stat-num.teal  { color: #009995; }
    .stat-label { font-size: 10px; color: #9ca3af; margin-top: 2px; }

    /* ── Avg row ── */
    .avg-row {
      display: flex; gap: 6px; margin-top: 6px;
    }
    .avg-cell {
      flex: 1; text-align: center;
      background: #f9fafb; border-radius: 8px;
      padding: 6px 4px;
    }
    .avg-label { font-size: 10px; color: #9ca3af; }
    .avg-val   { font-size: 15px; font-weight: 700; color: #009995; }

    /* ── Capture log ── */
    .capture-log {
      display: flex; align-items: center; gap: 7px;
      background: #f9fafb; border: 1px solid #e5e7eb;
      border-radius: 8px; padding: 7px 10px;
      font-size: 11px;
    }
    .log-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .log-dot.ok    { background: #22c55e; }
    .log-dot.err   { background: #ef4444; }
    .log-dot.info  { background: #3b82f6; }
    .log-text { flex: 1; color: #374151; font-weight: 500; }
    .log-time { color: #9ca3af; white-space: nowrap; }

    /* ── Test button ── */
    .btn-test {
      width: 100%;
      padding: 9px 0;
      background: #009995; color: #fff;
      border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-test:disabled { opacity: .45; cursor: not-allowed; }
    .btn-test:hover:not(:disabled) { opacity: .85; }

    /* ── Footer ── */
    .footer-row {
      display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #f0f0f0;
      padding: 8px 14px;
      background: #fff;
    }
    .settings-link {
      font-size: 12px; color: #009995;
      background: none; border: none; cursor: pointer;
      font-family: inherit; padding: 0;
    }
    .settings-link:hover { text-decoration: underline; }
    .footer-copy { font-size: 11px; color: #d1d5db; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <span class="header-title">TikTok Shop Helper</span>
    <div class="header-right">
      <span id="tierBadge" class="tier-badge">Free</span>
      <span class="version-badge" id="versionBadge"></span>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot gray" id="statusDot"></div>
      <span class="status-text" id="statusText">ไม่พบไลฟ์</span>
    </div>
    <div class="last-time" id="lastCapture">–</div>
  </div>

  <!-- Thumbnail preview -->
  <div class="thumb-section">
    <img class="thumb-img" id="thumbImg" alt="ภาพจากไลฟ์" />
    <div class="thumb-placeholder" id="thumbPlaceholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M10 9l5 3-5 3V9z"/>
      </svg>
      <span>ยังไม่มีภาพ</span>
    </div>
    <!-- capturing / analyzing overlay -->
    <div class="thumb-overlay" id="thumbOverlay">
      <div class="spinner"></div>
      <span class="overlay-text" id="overlayText">กำลังบันทึก...</span>
    </div>
    <!-- time badge -->
    <div class="thumb-badge" id="thumbBadge"></div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Alert banner -->
    <div class="alert-banner" id="alertBanner">⚠️ พบพฤติกรรมผิดปกติ</div>

    <!-- Google Drive warning banner -->
    <div class="alert-banner" id="driveBanner" style="background:#fff7ed;border-color:#fdba74;color:#c2410c">
      ⚠️ Google Drive ต้องเชื่อมต่อใหม่
    </div>

    <!-- Google Drive status row -->
    <div class="capture-log" id="driveRow" style="display:flex">
      <span class="log-dot info" id="driveDot"></span>
      <span class="log-text" id="driveText">Google Drive</span>
      <button id="btnReconnectDrive" style="background:none;border:1px solid #009995;color:#009995;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer">Reconnect</button>
    </div>

    <!-- Last analysis result -->
    <div class="card" id="resultCard" style="display:none">
      <div class="card-title">ผลวิเคราะห์ล่าสุด</div>

      <div class="score-row">
        <span class="score-label">😊 ยิ้มแย้ม</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" id="fillSmile" style="width:0%"></div></div>
          <span class="score-num" id="numSmile">–</span>
        </div>
      </div>

      <div class="score-row">
        <span class="score-label">👁 มองกล้อง</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" id="fillEye" style="width:0%"></div></div>
          <span class="score-num" id="numEye">–</span>
        </div>
      </div>

      <div class="score-row">
        <span class="score-label">⚡ พลังงาน</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" id="fillEnergy" style="width:0%"></div></div>
          <span class="score-num" id="numEnergy">–</span>
        </div>
      </div>

      <div class="score-row">
        <span class="score-label">🎯 Engage</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" id="fillEngage" style="width:0%"></div></div>
          <span class="score-num" id="numEngage">–</span>
        </div>
      </div>

      <div class="score-row">
        <span class="score-label">💡 แสง</span>
        <div class="score-bar-wrap">
          <div class="score-bar"><div class="score-fill" id="fillLight" style="width:0%"></div></div>
          <span class="score-num" id="numLight">–</span>
        </div>
      </div>

      <div class="flags-row" id="flagsRow"></div>
      <div class="summary-text" id="summaryText"></div>
    </div>

    <!-- Today's stats -->
    <div class="card" id="statsCard" style="display:none">
      <div class="card-title">สถิติวันนี้</div>
      <div class="stats-grid">
        <div class="stat-cell">
          <div class="stat-num teal" id="statBursts">0</div>
          <div class="stat-label">ครั้งที่ตรวจ</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num red" id="statAlerts">0</div>
          <div class="stat-label">แจ้งเตือน</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num amber" id="statPhones">0</div>
          <div class="stat-label">ถือมือถือ</div>
        </div>
      </div>
      <div class="avg-row">
        <div class="avg-cell">
          <div class="avg-label">😊 เฉลี่ย</div>
          <div class="avg-val" id="avgSmile">–</div>
        </div>
        <div class="avg-cell">
          <div class="avg-label">👁 เฉลี่ย</div>
          <div class="avg-val" id="avgEye">–</div>
        </div>
      </div>
    </div>

    <!-- Test button -->
    <button class="btn-test" id="btnTest">▶ ทดสอบ Capture ทันที</button>

    <!-- Capture status log -->
    <div class="capture-log" id="captureLog" style="display:none">
      <span class="log-dot" id="logDot"></span>
      <span class="log-text" id="logText"></span>
      <span class="log-time" id="logTime"></span>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer-row">
    <button class="settings-link" id="settingsLink">⚙ ตั้งค่า</button>
    <span class="footer-copy">LiveWatch © 2026</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
